<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;

  /* ✅ ONLY IMAGE (no dark overlay) */
  background-image: url("background.jpg"); /* ← FIX THIS PATH */
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

/* container */
.container {
  max-width: 900px;
  margin: 40px auto;
  padding: 20px;

  background: rgba(255,255,255,0.85);
  border-radius: 20px;
  text-align: center;
}

/* logo */
.logo {
  max-width: 150px;
  margin-bottom: 20px;
}

/* text */
.subtitle {
  font-size: 14px;
  margin-bottom: 30px;
}

/* 🔥 GRID (3 per row) */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

/* card */
.card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* image */
.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

/* button */
.btn {
  display: block;
  padding: 10px;
  text-decoration: none;
  background: #1e5fd8;
  color: white;
  font-size: 13px;
}

/* hover */
.card:hover {
  transform: translateY(-3px);
  transition: 0.2s;
}

/* mobile (1 column) */
@media (max-width: 600px) {
  .grid {
    grid-template-columns: 1fr;
  }
}

/* social */
.social {
  margin-top: 25px;
}

.social a {
  margin: 0 8px;
}

/* footer */
.footer {
  margin-top: 15px;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="container">

  <img src="logo.png?v=2" class="logo">

  <p class="subtitle">
    この度はご多忙の中、誠にありがとうございます。<br>
    下記より各種ご提案内容をご確認ください。
  </p>

  <!-- 🔥 GRID START -->
  <div class="grid">

    <div class="card">
      <img src="home.JPG">
      <a class="btn" href="https://www.meizanso.com/" target="_blank">ホームページ</a>
    </div>

    <div class="card">
      <img src="pamphlet.JPG">
      <a class="btn" href="#">パンフレット</a>
    </div>

    <div class="card">
      <img src="stay.JPG">
      <a class="btn" href="#">団体宿泊プラン</a>
    </div>

    <div class="card">
      <img src="lunch.JPG">
      <a class="btn" href="#">団体昼食プラン</a>
    </div>

    <div class="card">
      <img src="mice.JPG">
      <a class="btn" href="#">MICE</a>
    </div>

    <div class="card">
      <img src="floormap.JPG">
      <a class="btn" href="#">平面図</a>
    </div>

  </div>
  <!-- 🔥 GRID END -->

  <div class="social">
    <a href="https://page.line.me/meizanso">LINE</a>
    <a href="https://www.instagram.com/meizanso/">Instagram</a>
    <a href="https://www.facebook.com/meizanso/">Facebook</a>
  </div>

  <div class="footer">
    ホテル明山荘<br>
    TEL: 0533-68-4641
  </div>

</div>

</body>
</html>
