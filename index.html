<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;

  /* ✅ FIXED BACKGROUND */
  background-image: url("background-image.JPG");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

/* container */
.container {
  max-width: 900px;
  margin: 40px auto;
  padding: 20px;

  background: rgba(255,255,255,0.85);
  border-radius: 20px;
  text-align: center;
}

/* logo */
.logo {
  max-width: 150px;
  margin-bottom: 20px;
}

/* text */
.subtitle {
  font-size: 14px;
  margin-bottom: 30px;
}

/* grid (3 per row) */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

/* card */
.card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-4px);
}

/* image */
.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

/* button */
.btn {
  display: block;
  padding: 10px;
  text-decoration: none;
  background: #1e5fd8;
  color: white;
  font-size: 13px;
}

/* mobile */
@media (max-width: 600px) {
  .grid {
    grid-template-columns: 1fr;
  }
}

/* social icons */
.social {
  margin-top: 25px;
  display: flex;
  justify-content: center;
  gap: 18px;
}

.social a {
  width: 40px;
  height: 40px;
  background: rgba(255,255,255,0.9);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.social img {
  width: 20px;
  height: 20px;
}

/* footer */
.footer {
  margin-top: 15px;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="container">

  <img src="logo.png?v=2" class="logo">

  <p class="subtitle">
    この度はご多忙の中、誠にありがとうございます。<br>
    下記より各種ご提案内容をご確認ください。
  </p>

  <div class="grid">

    <div class="card">
      <img src="home.JPG">
      <a class="btn" href="https://www.meizanso.com/" target="_blank">ホームページ</a>
    </div>

    <div class="card">
      <img src="pamphlet.JPG">
      <a class="btn" href="https://www.meizanso.com/mwp/wp-content/uploads/2025/08/mainpanf_202508.pdf" target="_blank">パンフレット</a>
    </div>

    <div class="card">
      <img src="stay.JPG">
      <a class="btn" href="https://www.meizanso.com/mwp/wp-content/uploads/2026/01/8%E5%90%8D%E6%A7%98%E4%BB%A5%E4%B8%8A%E5%9B%A3%E4%BD%93%E5%AE%BF%E6%B3%8A%E3%83%97%E3%83%A9%E3%83%B3-1.pdf" target="_blank">団体宿泊プラン</a>
    </div>

    <div class="card">
      <img src="lunch.JPG">
      <a class="btn" href="https://www.meizanso.com/mwp/wp-content/uploads/2026/01/15%E5%90%8D%E6%A7%98%E4%BB%A5%E4%B8%8A%E5%9B%A3%E4%BD%93%E5%90%91%E3%81%91%E3%81%94%E6%98%BC%E9%A3%9F%E3%83%97%E3%83%A9%E3%83%B3.png" target="_blank">団体昼食プラン</a>
    </div>

    <div class="card">
      <img src="mice.JPG">
      <a class="btn" href="https://www.meizanso.com/mwp/wp-content/uploads/2025/12/MICE%E3%83%91%E3%83%B3%E3%83%95%E3%83%AC%E3%83%83%E3%83%88.pdf" target="_blank">MICEパンフレット</a>
    </div>

    <div class="card">
      <img src="floormap.JPG">
      <a class="btn" href="https://www.meizanso.com/mwp/wp-content/uploads/2025/09/%E5%AE%A2%E5%AE%A4%E3%81%AE%E3%81%94%E6%A1%88%E5%86%85.pdf" target="_blank">平面図</a>
    </div>

  </div>

  <!-- ✅ SOCIAL ICONS FIXED -->
  <div class="social">
    <a href="https://page.line.me/meizanso" target="_blank">
      <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/line.svg">
    </a>
    <a href="https://www.instagram.com/meizanso/" target="_blank">
      <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/instagram.svg">
    </a>
    <a href="https://www.facebook.com/meizanso/" target="_blank">
      <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/facebook.svg">
    </a>
  </div>

  <div class="footer">
    ホテル明山荘<br>
    TEL: 0533-68-4641
  </div>

</div>

</body>
</html>
